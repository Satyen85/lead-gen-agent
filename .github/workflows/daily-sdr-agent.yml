name: Daily SDR Agent

on:
  schedule:
    - cron: '0 6 * * 1-4'  # 2 AM Eastern Mon-Thu (6 AM UTC)
  workflow_dispatch:  # allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SDR Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python sdr_agent.py

      - name: Commit processed tracking files
        run: |
          git config user.name "SDR Agent Bot"
          git config user.email "bot@anycard.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Satyen85/lead-gen-agent.git
          touch processed.txt rep_counter.txt
          git add processed.txt rep_counter.txt apollo-contacts-export.csv
          git commit -m "Update processed tracking - $(date)" || echo "No changes"
          git push